<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我 | Andrew</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <header id="navbar-container" class="navbar"></header>

    <main class="full-width-content">
        <section>
            <h2><span class="material-symbols-outlined">person</span>關於我</h2>
            <p id="about-bio">讀取中...</p>
            
            <h3 style="margin-top: 1.5rem; margin-bottom: 0.5rem;">
                <span class="material-symbols-outlined" id="skills-icon">psychology</span>
                <span id="skills-section-title">我的技能</span>
            </h3>
            <ul style="padding-left: 1.5rem; color: var(--md-sys-color-text-muted);" id="dynamic-skills-list"></ul>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbar();
            await loadAboutData();
        });

        async function loadAboutData() {
            try {
                const res = await fetchDatabase();
                const about = res.data.profile.about;

                if (about) {
                    document.getElementById('about-bio').innerText = about.bio;
                    document.getElementById('skills-section-title').innerText = about.skills_title;
                    document.getElementById('skills-icon').innerText = about.skills_icon || "psychology";

                    const skillsList = about.skills_list || [];
                    const listContainer = document.getElementById('dynamic-skills-list');
                    listContainer.innerHTML = skillsList.map(skill => `
                        <li style="margin-bottom:0.5rem;">
                            <strong>${skill.label}：</strong>
                            <span>${skill.value}</span>
                        </li>
                    `).join('');
                }
            } catch (err) {
                console.error("無法載入個人檔案：", err);
            }
        }
    </script>
</body>
</html>
