<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓稟鈞 (Andrew) | 首頁</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <!-- 導覽列容器 -->
    <header id="navbar-container" class="navbar"></header>

    <main class="full-width-content">
        <!-- 1. 個人簡介 -->
        <section>
            <h1>Hello, 我是卓稟鈞 (Andrew)！</h1>
            <p style="font-size: 1.2rem; color: var(--text-color);">一個對寫程式充滿無限好奇心的高中生。</p>
            <p>
                我熱衷於用 <span class="highlight">Python、C++</span> 和<span class="highlight">前端技術</span>，將腦中的奇思妙想打造成真正能解決問題的工具。從 Discord Bot 到交通查詢 App，我的目標始終是——<strong class="highlight">讓科技更貼近生活</strong>。
            </p>
        </section>

        <!-- 2. 新增：最新公告區塊 -->
        <section class="announcement-section">
            <div class="announcement-header">
                <span class="material-symbols-outlined" style="color: var(--primary-color);">campaign</span>
                <span>最新公告</span>
            </div>
            <ul class="announcement-list">
                <li class="announcement-item">
                    <span class="announcement-date">2026-06-08</span>
                    <span class="announcement-content">網站系統成功升級！目前已將所有分頁進行實體檔案拆分，並部署至 GitHub Pages。</span>
                </li>
                <li class="announcement-item">
                    <span class="announcement-date">2026-06-05</span>
                    <span class="announcement-content">正在測試將 YouBike 2.0 查詢工具與個人網站進行更深度的整合。</span>
                </li>
            </ul>
        </section>
    </main>

    <!-- 載入共用組件腳本 -->
    <script src="js/main.js"></script>
    <script>
        // Preloader 控制
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });
        
        // 載入導覽列
        document.addEventListener('DOMContentLoaded', loadNavbar);
    </script>
</body>
</html>
