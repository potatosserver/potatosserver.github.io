<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓稟鈞 (Andrew) | 個人網站</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <header id="navbar-container" class="navbar"></header>

    <main class="full-width-content">
        <section id="home-section">
            <h1>Hello, 我是卓稟鈞 (Andrew)！</h1>
            <p style="font-size: 1.2rem; color: var(--md-sys-color-text-main);">一個對寫程式充滿無限好奇心的高中生。</p>
            <p>
                我熱衷於用 <span class="highlight">Python、C++</span> 和<span class="highlight">前端技術</span>，將腦中的奇思妙想打造成真正能解決問題的工具。從 Discord Bot 到交通查詢 App，我的目標始終是——<strong class="highlight">讓科技更貼近生活</strong>。
            </p>
        </section>

        <section class="announcement-section" style="padding: 1.5rem 1rem;">
            <div class="announcement-header" style="padding-left: 0.5rem; margin-bottom: 0.5rem;">
                <span class="material-symbols-outlined" style="color: var(--md-sys-color-primary);">campaign</span>
                <span>最新公告</span>
            </div>
            <ul class="announcement-list" id="dynamic-announcements">
                <li style="color: var(--md-sys-color-text-muted); padding: 0.5rem;">正在自 GitHub 載入雲端公告項目...</li>
            </ul>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbar();
            await loadDynamicAnnouncements();
        });

        async function loadDynamicAnnouncements() {
            const container = document.getElementById('dynamic-announcements');
            try {
                const result = await fetchDatabase();
                const announcements = result.data.announcements || [];

                if (announcements.length === 0) {
                    container.innerHTML = '<li class="announcement-item" style="padding:0.75rem 0.5rem;"><span class="announcement-content">目前尚無公告。</span></li>';
                    return;
                }

                announcements.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return new Date(b.date) - new Date(a.date);
                });

                container.innerHTML = announcements.map(ann => `
                    <li class="announcement-item" style="padding: 0; border-bottom: 1px solid var(--md-sys-color-outline);">
                        <a href="announcement-detail.html?id=${ann.id}" style="display: flex; align-items: flex-start; gap: 1rem; width: 100%; padding: 0.95rem 0.75rem; text-decoration: none; color: inherit; transition: background-color 0.2s; border-radius: var(--md-shape-corner-large);" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.03)'" onmouseout="this.style.backgroundColor='transparent'">
                            <span class="announcement-date" style="color: var(--md-sys-color-primary); font-weight: 600; font-size: 0.85rem; white-space: nowrap; padding-top: 0.15rem; margin: 0;">${ann.date}</span>
                            <span class="announcement-content" style="color: var(--md-sys-color-text-main); font-size: 0.95rem; line-height: 1.5;">
                                ${ann.pinned ? '<span style="color:var(--md-sys-color-primary); font-weight:bold; margin-right:5px;">[置頂]</span>' : ''}
                                ${ann.title}
                            </span>
                        </a>
                    </li>
                `).join('');

            } catch (error) {
                console.error(error);
                container.innerHTML = '<li class="announcement-item" style="padding: 0.75rem 0.5rem; color: #ef4444;"><span class="announcement-content">無法與 GitHub 連線以載入最新公告。</span></li>';
            }
        }
    </script>
</body>
</html>
