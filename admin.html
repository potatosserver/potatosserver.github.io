<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 | Andrew</title>
    <!-- 引入 Icon 樣式表，解決圖示載入不出來的問題 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <!-- 頂部共用導覽列 -->
    <header id="navbar-container" class="navbar"></header>

    <!-- 側邊欄容器 -->
    <div id="sidebar-container"></div>

    <!-- 右側主要內容區域 -->
    <main class="main-content">
        <section id="admin-panel">
            <h2 style="margin-top: 0; border-bottom: none; padding-bottom: 0;">
                <span class="material-symbols-outlined" style="font-size: 1.5em; color: var(--primary-color);">admin_panel_settings</span>
                <span>系統管理後台</span>
            </h2>
            <p style="color: var(--text-secondary-color); margin-bottom: 2rem;">請使用左側選單切換設定與內容管理項目。</p>
            
            <div class="card" style="padding: 2rem;">
                <h3 style="color: var(--primary-color); margin-bottom: 1rem;">歡迎使用管理系統</h3>
                <p>在這裡，您將能夠透過 GitHub API 進行雲端資料更新。目前系統外觀已調整完畢，下一個階段我們將開始實作與 GitHub 儲存庫的連線設定。</p>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Preloader 控制
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        // 載入導覽列與側邊欄
        async function loadAdminLayout() {
            // 載入頂部導覽列 (使用 js/main.js 內定義的 loadNavbar)
            await loadNavbar();
            
            // 載入左側側邊欄
            try {
                const response = await fetch('components/sidebar.html');
                if (response.ok) {
                    const html = await response.text();
                    document.getElementById('sidebar-container').innerHTML = html;
                    bindSidebarEvents();
                }
            } catch (error) {
                console.error('側邊欄組件載入失敗:', error);
            }
        }

        // 綁定側邊欄按鈕的選取切換效果
        function bindSidebarEvents() {
            const buttons = document.querySelectorAll('.sidebar-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', loadAdminLayout);
    </script>
</body>
</html>
