<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 | Andrew</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <header id="navbar-container" class="navbar"></header>

    <!-- ===================================================
         1. 未登入狀態
         =================================================== -->
    <div id="login-view" class="full-width-content" style="display: none; max-width: 480px; text-align: center; margin-top: 15vh;">
        <div class="card" style="padding: 3rem 2rem;">
            <span class="material-symbols-outlined" style="font-size: 4rem; color: var(--md-sys-color-primary); margin-bottom: 1rem;">lock</span>
            <h2 style="border-bottom: none; justify-content: center; margin-top: 0; margin-bottom: 0.5rem;">管理員登入</h2>
            <p style="margin-bottom: 2rem; color: var(--md-sys-color-text-muted);">此區域僅供網頁擁有者存取，請使用您的 GitHub 帳號進行身分驗證。</p>
            <button id="btn-github-login" class="sidebar-btn active" style="justify-content: center; font-size: 1.1rem; padding: 1rem;">
                <span class="material-symbols-outlined">login</span>
                <span>使用 GitHub 帳號登入</span>
            </button>
        </div>
    </div>

    <!-- ===================================================
         2. 已登入狀態
         =================================================== -->
    <div id="admin-view" class="layout-container" style="display: none;">
        
        <div id="sidebar-container"></div>

        <main class="main-content">
            
            <!-- 2.1 連線設定面板 -->
            <section id="panel-settings" class="admin-panel-section">
                <h2 style="margin-top: 0;">
                    <span class="material-symbols-outlined" style="color: var(--md-sys-color-primary);">cloud_sync</span>
                    <span>雲端同步狀態</span>
                </h2>
                <div class="card" style="padding: 2rem; margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                        <span id="connection-indicator" class="material-symbols-outlined" style="color: #4ade80; font-size: 2.5rem;">check_circle</span>
                        <div>
                            <h3 id="connection-status">已成功與 GitHub 建立安全連線</h3>
                            <p style="margin: 0; font-size: 0.9rem; color: var(--md-sys-color-text-muted);">您的身分權杖已安全儲存於本地瀏覽器中。</p>
                        </div>
                    </div>
                    <div style="border-top: 1px solid var(--md-sys-color-outline); padding-top: 1.5rem; margin-top: 1.5rem;">
                        <button id="btn-logout" class="sidebar-btn" style="width: auto; background-color: #ef4444; color: white; border-color: #ef4444;">
                            <span class="material-symbols-outlined">logout</span>
                            <span>登出管理系統</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 2.2 公告管理面板 -->
            <section id="panel-announcements" class="admin-panel-section" style="display: none;">
                <h2 style="margin-top: 0;">
                    <span class="material-symbols-outlined" style="color: var(--md-sys-color-primary);">campaign</span>
                    <span>公告管理</span>
                </h2>
                
                <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                    <h3 id="form-ann-title" style="margin-bottom: 1.5rem; color: var(--md-sys-color-primary); display: flex; align-items: center; gap: 0.5rem;">
                        <span class="material-symbols-outlined">add_box</span>
                        <span>新增系統公告</span>
                    </h3>
                    
                    <form id="form-announcement">
                        <input type="hidden" id="ann-id">
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.2rem;">
                            <div style="display: flex; flex-direction: column;">
                                <label style="margin-bottom: 0.5rem; font-weight: bold;">公告標題</label>
                                <input type="text" id="ann-input-title" required>
                            </div>
                            <div style="display: flex; flex-direction: column;">
                                <label style="margin-bottom: 0.5rem; font-weight: bold;">發布日期</label>
                                <input type="date" id="ann-input-date" required>
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; margin-bottom: 1.2rem;">
                            <label style="margin-bottom: 0.5rem; font-weight: bold;">詳細內容 (支援換行)</label>
                            <textarea id="ann-input-content" rows="6" required></textarea>
                        </div>

                        <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="ann-input-pinned" style="width: 18px; height: 18px; cursor: pointer;">
                            <label for="ann-input-pinned" style="font-weight: bold; cursor: pointer; color: var(--md-sys-color-primary);">將此公告置頂</label>
                        </div>

                        <div style="display: flex; gap: 1rem;">
                            <button type="submit" id="btn-ann-submit" class="sidebar-btn active" style="width: auto; padding: 0.75rem 1.5rem;">儲存公告</button>
                            <button type="button" id="btn-ann-cancel" class="sidebar-btn" style="width: auto; padding: 0.75rem 1.5rem; display: none; background: #64748b;">取消編輯</button>
                        </div>
                    </form>
                </div>

                <div class="card" style="padding: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span class="material-symbols-outlined">list_alt</span>
                        <span>現有公告列表</span>
                    </h3>
                    <div id="admin-ann-list" style="display: flex; flex-direction: column; gap: 1rem;">
                        <p style="color: var(--md-sys-color-text-muted);">正在讀取雲端資料庫清單...</p>
                    </div>
                </div>
            </section>

            <!-- 2.3 作品管理面板 -->
            <section id="panel-projects" class="admin-panel-section" style="display: none;">
                <h2 style="margin-top: 0;">
                    <span class="material-symbols-outlined" style="color: var(--md-sys-color-primary);">folder</span>
                    <span>作品管理</span>
                </h2>
                
                <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                    <h3 id="form-proj-title" style="margin-bottom: 1.5rem; color: var(--md-sys-color-primary); display: flex; align-items: center; gap: 0.5rem;">
                        <span class="material-symbols-outlined">create_new_folder</span>
                        <span>新增作品專案</span>
                    </h3>
                    
                    <form id="form-project">
                        <input type="hidden" id="proj-id">
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.2rem;">
                            <div style="display: flex; flex-direction: column;">
                                <label style="margin-bottom: 0.5rem; font-weight: bold;">專案名稱 (作品名稱)</label>
                                <input type="text" id="proj-input-title" required>
                            </div>
                            <div style="display: flex; flex-direction: column;">
                                <label style="margin-bottom: 0.5rem; font-weight: bold;">GitHub 專案連結 (URL)</label>
                                <input type="url" id="proj-input-url" required>
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; margin-bottom: 1.5rem;">
                            <label style="margin-bottom: 0.5rem; font-weight: bold;">作品詳細描述</label>
                            <textarea id="proj-input-desc" rows="4" required></textarea>
                        </div>

                        <div style="display: flex; gap: 1rem;">
                            <button type="submit" id="btn-proj-submit" class="sidebar-btn active" style="width: auto; padding: 0.75rem 1.5rem;">儲存作品</button>
                            <button type="button" id="btn-proj-cancel" class="sidebar-btn" style="width: auto; padding: 0.75rem 1.5rem; display: none; background: #64748b;">取消編輯</button>
                        </div>
                    </form>
                </div>

                <div class="card" style="padding: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span class="material-symbols-outlined">folder_open</span>
                        <span>現有專案列表</span>
                    </h3>
                    <div id="admin-proj-list" style="display: flex; flex-direction: column; gap: 1rem;">
                        <p style="color: var(--md-sys-color-text-muted);">正在讀取雲端專案清單...</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        const GITHUB_CLIENT_ID = 'Ov23limDuIK15ITZ4Tuo'; 
        const WORKER_URL = 'https://github-oauth-handler.potatosserver.workers.dev/'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let dbCache = { announcements: [], projects: [] };
        let dbSha = '';

        console.log("後台指令稿載入成功，準備初始化。");

        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            console.log("DOM 解析完畢，開始載入導覽列與進行登入檢查。");
            await loadNavbar();
            await checkAuth();
            bindFormEvents(); 
            bindProjectFormEvents(); 
        });

        async function checkAuth() {
            const token = localStorage.getItem('gh_token');
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (token) {
                console.log("驗證狀態：已登入。");
                document.getElementById('admin-view').style.display = 'flex';
                await loadSidebar();
            } else if (code) {
                console.log("驗證狀態：偵測到 OAuth 臨時 Code，開始交換 Token。");
                const preloader = document.getElementById('preloader');
                if (preloader) preloader.classList.remove('hidden');
                await exchangeCodeForToken(code);
            } else {
                console.log("驗證狀態：未登入。顯示安全登入卡片。");
                document.getElementById('login-view').style.display = 'block';
                bindLoginEvent();
            }
        }

        function bindLoginEvent() {
            const btn = document.getElementById('btn-github-login');
            if (btn) {
                btn.addEventListener('click', () => {
                    console.log("重導向至 GitHub OAuth 授權頁面...");
                    const githubAuthUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=repo`;
                    window.location.href = githubAuthUrl;
                });
            }
        }

        async function exchangeCodeForToken(code) {
            try {
                console.log("向 Cloudflare Worker 發送交換請求...");
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (data.access_token) {
                    console.log("Token 交換成功！安全寫入 localStorage。");
                    localStorage.setItem('gh_token', data.access_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    location.reload();
                } else {
                    console.error("交換 Token 失敗：", data);
                    alert('登入失敗，無法交換安全金鑰。原因：' + (data.error_description || data.error || '未定義錯誤。'));
                    window.history.replaceState({}, document.title, window.location.pathname);
                    location.reload();
                }
            } catch (error) {
                console.error('與驗證端通訊錯誤：', error);
                alert('伺服器連線異常。');
                window.history.replaceState({}, document.title, window.location.pathname);
                location.reload();
            }
        }

        async function loadSidebar() {
            try {
                console.log("開始動態載入側邊欄組件...");
                const response = await fetch('components/sidebar.html');
                if (response.ok) {
                    const html = await response.text();
                    document.getElementById('sidebar-container').innerHTML = html;
                    bindSidebarEvents();
                    bindLogoutEvent();
                }
            } catch (error) {
                console.error('側邊欄組件載入失敗:', error);
            }
        }

        function bindSidebarEvents() {
            const buttons = document.querySelectorAll('#sidebar-container .sidebar-btn');
            console.log("已成功獲取並綁定側邊欄按鈕事件。數量：", buttons.length);
            
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const btnId = this.id;
                    console.log(`切換管理面板：${btnId}`);
                    hideAllPanels();

                    if (btnId === 'btn-menu-settings') {
                        document.getElementById('panel-settings').style.display = 'block';
                    } else if (btnId === 'btn-menu-projects') {
                        document.getElementById('panel-projects').style.display = 'block';
                        refreshProjects(); 
                    } else if (btnId === 'btn-menu-articles') {
                        document.getElementById('panel-announcements').style.display = 'block';
                        refreshAnnouncements(); 
                    }
                });
            });
        }

        function hideAllPanels() {
            const panels = document.querySelectorAll('.admin-panel-section');
            panels.forEach(panel => {
                panel.style.display = 'none';
            });
        }

        function bindLogoutEvent() {
            const btn = document.getElementById('btn-logout');
            if (btn) {
                btn.addEventListener('click', () => {
                    if (confirm('確定要登出管理系統嗎？')) {
                        localStorage.removeItem('gh_token');
                        location.reload();
                    }
                });
            }
        }

        // ===================================================
        // 雲端公告管理 (CRUD) 控制邏輯
        // ===================================================
        function bindFormEvents() {
            const form = document.getElementById('form-announcement');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    console.log("偵測到「儲存公告」事件觸發");

                    const annId = document.getElementById('ann-id').value;
                    const title = document.getElementById('ann-input-title').value.trim();
                    const date = document.getElementById('ann-input-date').value;
                    const content = document.getElementById('ann-input-content').value;
                    const pinned = document.getElementById('ann-input-pinned').checked;

                    if (!dbCache.announcements) {
                        dbCache.announcements = [];
                    }

                    const currentAnnData = {
                        id: annId || 'ann-' + Date.now(),
                        title,
                        date,
                        content,
                        pinned
                    };

                    if (annId) {
                        const idx = dbCache.announcements.findIndex(item => item.id === annId);
                        if (idx > -1) dbCache.announcements[idx] = currentAnnData;
                    } else {
                        dbCache.announcements.push(currentAnnData);
                    }

                    await syncToGitHub('公告儲存');
                    resetAnnForm();
                });
            }

            const cancelBtn = document.getElementById('btn-ann-cancel');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', resetAnnForm);
            }
        }

        async function refreshAnnouncements() {
            const listContainer = document.getElementById('admin-ann-list');
            listContainer.innerHTML = '<p style="color: var(--md-sys-color-text-muted);">讀取雲端最新資料中...</p>';
            
            try {
                const res = await fetchDatabase();
                dbCache = res.data;
                dbSha = res.sha;
                renderAdminAnnouncements();
            } catch (err) {
                console.error("下載雲端資料失敗：", err);
                listContainer.innerHTML = '<p style="color: #ef4444;">下載資料庫失敗，請確認 data/projects_articles.json 檔案是否存在。</p>';
            }
        }

        function renderAdminAnnouncements() {
            const listContainer = document.getElementById('admin-ann-list');
            const items = dbCache.announcements || [];

            if (items.length === 0) {
                listContainer.innerHTML = '<p style="color: var(--md-sys-color-text-muted);">目前沒有任何公告項目。</p>';
                return;
            }

            items.sort((a, b) => new Date(b.date) - new Date(a.date));

            listContainer.innerHTML = items.map(ann => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--md-sys-color-background); border: 1px solid var(--md-sys-color-outline); border-radius: var(--md-shape-corner-medium);">
                    <div>
                        <span style="font-size: 0.85rem; color: var(--md-sys-color-primary); font-weight: bold; margin-right: 10px;">${ann.date}</span>
                        ${ann.pinned ? '<span style="background:var(--md-sys-color-primary); color:var(--md-sys-color-on-primary); font-size:0.75rem; padding: 2px 6px; border-radius:var(--md-shape-corner-full); font-weight:bold; margin-right:10px;">置頂</span>' : ''}
                        <strong style="color: var(--md-sys-color-text-main);">${ann.title}</strong>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button onclick="editAnnouncement('${ann.id}')" class="sidebar-btn" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; background:#eab308; color:#000;">編輯</button>
                        <button onclick="deleteAnnouncement('${ann.id}')" class="sidebar-btn" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; background:#ef4444; color:#fff;">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function editAnnouncement(id) {
            const ann = dbCache.announcements.find(item => item.id === id);
            if (ann) {
                document.getElementById('ann-id').value = ann.id;
                document.getElementById('ann-input-title').value = ann.title;
                document.getElementById('ann-input-date').value = ann.date;
                document.getElementById('ann-input-content').value = ann.content;
                document.getElementById('ann-input-pinned').checked = ann.pinned || false;

                document.getElementById('form-ann-title').innerHTML = '<span class="material-symbols-outlined">edit_note</span><span>編輯系統公告</span>';
                document.getElementById('btn-ann-cancel').style.display = 'inline-flex';
                document.getElementById('form-announcement').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetAnnForm() {
            document.getElementById('form-announcement').reset();
            document.getElementById('ann-id').value = '';
            document.getElementById('form-ann-title').innerHTML = '<span class="material-symbols-outlined">add_box</span><span>新增系統公告</span>';
            document.getElementById('btn-ann-cancel').style.display = 'none';
        }

        async function deleteAnnouncement(id) {
            if (confirm('確定要永久刪除此公告嗎？這個動作將會自動同步提交至 GitHub。')) {
                dbCache.announcements = dbCache.announcements.filter(item => item.id !== id);
                await syncToGitHub('刪除公告');
            }
        }

        // ===================================================
        // 雲端作品專案管理 (CRUD) 控制邏輯
        // ===================================================
        function bindProjectFormEvents() {
            const form = document.getElementById('form-project');
            if (form) {
                console.log("作品專案表單監聽器準備完畢。");
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    console.log("偵測到「儲存作品」事件觸發");

                    const projId = document.getElementById('proj-id').value;
                    const title = document.getElementById('proj-input-title').value.trim();
                    const github_url = document.getElementById('proj-input-url').value.trim();
                    const description = document.getElementById('proj-input-desc').value.trim();

                    if (!dbCache.projects) {
                        dbCache.projects = [];
                    }

                    const currentProjData = {
                        id: projId || 'proj-' + Date.now(),
                        title,
                        description,
                        github_url
                    };

                    if (projId) {
                        console.log("目前處於作品【編輯模式】，更新 ID：", projId);
                        const idx = dbCache.projects.findIndex(item => item.id === projId);
                        if (idx > -1) dbCache.projects[idx] = currentProjData;
                    } else {
                        console.log("目前處於作品【新增模式】");
                        dbCache.projects.push(currentProjData);
                    }

                    await syncToGitHub('作品專案儲存');
                    resetProjForm();
                });
            }

            const cancelBtn = document.getElementById('btn-proj-cancel');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', resetProjForm);
            }
        }

        async function refreshProjects() {
            const listContainer = document.getElementById('admin-proj-list');
            listContainer.innerHTML = '<p style="color: var(--md-sys-color-text-muted);">讀取雲端專案中...</p>';
            
            try {
                console.log("獲取雲端最新專案列表...");
                const res = await fetchDatabase();
                dbCache = res.data;
                dbSha = res.sha;
                renderAdminProjects();
            } catch (err) {
                console.error("下載雲端專案資料失敗：", err);
                listContainer.innerHTML = '<p style="color: #ef4444;">下載資料失敗，請確認 data/projects_articles.json 檔案是否存在。</p>';
            }
        }

        function renderAdminProjects() {
            const listContainer = document.getElementById('admin-proj-list');
            const items = dbCache.projects || [];

            if (items.length === 0) {
                listContainer.innerHTML = '<p style="color: var(--md-sys-color-text-muted);">目前沒有任何作品專案。</p>';
                return;
            }

            listContainer.innerHTML = items.map(proj => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--md-sys-color-background); border: 1px solid var(--md-sys-color-outline); border-radius: var(--md-shape-corner-medium);">
                    <div>
                        <strong style="color: var(--md-sys-color-text-main);">${proj.title}</strong>
                        <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: var(--md-sys-color-text-muted); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; max-width: 400px;">${proj.description}</p>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button onclick="editProject('${proj.id}')" class="sidebar-btn" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; background:#eab308; color:#000;">編輯</button>
                        <button onclick="deleteProject('${proj.id}')" class="sidebar-btn" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; background:#ef4444; color:#fff;">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function editProject(id) {
            console.log("準備編輯作品專案 ID：", id);
            const proj = dbCache.projects.find(item => item.id === id);
            if (proj) {
                document.getElementById('proj-id').value = proj.id;
                document.getElementById('proj-input-title').value = proj.title;
                document.getElementById('proj-input-url').value = proj.github_url;
                document.getElementById('proj-input-desc').value = proj.description;

                document.getElementById('form-proj-title').innerHTML = '<span class="material-symbols-outlined">edit</span><span>編輯作品專案</span>';
                document.getElementById('btn-proj-cancel').style.display = 'inline-flex';
                document.getElementById('form-project').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetProjForm() {
            document.getElementById('form-project').reset();
            document.getElementById('proj-id').value = '';
            document.getElementById('form-proj-title').innerHTML = '<span class="material-symbols-outlined">create_new_folder</span><span>新增作品專案</span>';
            document.getElementById('btn-proj-cancel').style.display = 'none';
        }

        async function deleteProject(id) {
            if (confirm('確定要永久刪除此作品嗎？這個動作將會自動同步提交至 GitHub。')) {
                dbCache.projects = dbCache.projects.filter(item => item.id !== id);
                await syncToGitHub('作品刪除');
            }
        }

        // ===================================================
        // 雲端資料同步 Commit
        // ===================================================
        async function syncToGitHub(actionText) {
            const preloader = document.getElementById('preloader');
            if (preloader) preloader.classList.remove('hidden'); 
            console.log("【同步】開啟動畫，開始進行 GitHub API 上傳。");

            try {
                console.log("【同步】正在重新獲取最新 SHA 值...");
                const latest = await fetchDatabase();
                dbSha = latest.sha;
                console.log("【同步】最新 SHA 獲取成功：", dbSha);

                console.log("【同步】開始調用 saveDatabase 上傳資料...");
                const res = await saveDatabase(dbCache, dbSha);
                dbSha = res.content.sha; 
                console.log("【同步】API 上傳成功！新 Commit SHA：", dbSha);
                
                if (preloader) preloader.classList.add('hidden');
                
                setTimeout(() => {
                    alert(`${actionText}成功！已透過 API 自動 Commit 更新至 GitHub Pages。`);
                    
                    const activeMenu = document.querySelector('#sidebar-container .sidebar-btn.active');
                    if (activeMenu && activeMenu.id === 'btn-menu-projects') {
                        renderAdminProjects();
                    } else if (activeMenu && activeMenu.id === 'btn-menu-articles') {
                        renderAdminAnnouncements();
                    }
                }, 50);

            } catch (err) {
                console.error("【同步失敗】過程發生異常：", err);
                if (preloader) preloader.classList.add('hidden');
                
                setTimeout(() => {
                    alert('與 GitHub 同步更新時發生錯誤：' + err.message);
                }, 50);
            }
        }
    </script>
</body>
</html>
