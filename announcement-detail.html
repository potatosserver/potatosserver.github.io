<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統公告 | Andrew</title>
    <!-- 引入 Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 預載入動畫 (Preloader) -->
    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <!-- 頂部共用導覽列 -->
    <header id="navbar-container" class="navbar"></header>

    <!-- 主要內容區 -->
    <main class="full-width-content">
        <!-- 卡片內邊距調整為 1.75rem，使其更精緻緊湊 -->
        <div class="card admin-view-fade" style="padding: 1.75rem; margin-top: 1rem;">
            
            <!-- 【緊湊排版】：大幅收緊返回按鈕的上下留白 -->
            <div style="margin-bottom: 1rem; border-bottom: 1px solid var(--md-sys-color-outline); padding-bottom: 0.75rem;">
                <a href="index.html" class="sidebar-btn" style="width: auto; display: inline-flex; align-items: center; padding: 0.5rem 1rem;">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span>返回首頁</span>
                </a>
            </div>

            <!-- 公告主體內容 -->
            <div id="announcement-detail-content">
                <p style="color: var(--md-sys-color-text-muted);">正在讀取公告詳細內容...</p>
            </div>
            
        </div>
    </main>

    <!-- 載入共用 JavaScript 邏輯 -->
    <script src="js/main.js"></script>
    <script>
        // 確保 Preloader 動態會在頁面載入後自動隱藏
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        // 網頁初始程序
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbar();
            await loadDetail();
        });

        // 動態載入並渲染公告詳細內容
        async function loadDetail() {
            const container = document.getElementById('announcement-detail-content');
            const urlParams = new URLSearchParams(window.location.search);
            const annId = urlParams.get('id');

            if (!annId) {
                container.innerHTML = `
                    <h2 style="border-bottom:none; margin-top:0;"><span class="material-symbols-outlined" style="color:var(--md-sys-color-primary);">error</span><span>未指定公告 ID</span></h2>
                    <p>請返回首頁重試。</p>
                `;
                return;
            }

            try {
                // 呼叫 js/main.js 的讀取核心 API
                const result = await fetchDatabase();
                const announcements = result.data.announcements || [];
                const ann = announcements.find(item => item.id === annId);

                if (!ann) {
                    container.innerHTML = `
                        <h2 style="border-bottom:none; margin-top:0;"><span class="material-symbols-outlined" style="color:var(--md-sys-color-primary);">find_in_page</span><span>找不到該公告內容</span></h2>
                        <p>該公告可能已被管理員移除。</p>
                    `;
                    return;
                }

                // 成功尋獲，渲染標題、日期、詳細內容
                container.innerHTML = `
                    <div style="display: flex; gap: 0.5rem; align-items: center; color: var(--md-sys-color-primary); margin-bottom: 0.5rem; font-size: 0.95rem;">
                        <span class="material-symbols-outlined" style="font-size: 1.25em;">calendar_month</span>
                        <span>發布日期：${ann.date}</span>
                    </div>
                    <h1 style="color: var(--md-sys-color-text-main); margin-bottom: 1.25rem; border-bottom: 2px solid var(--md-sys-color-primary); padding-bottom: 0.75rem; line-height: 1.4; font-size: 2rem; letter-spacing: -0.02em;">${ann.title}</h1>
                    <div style="font-size: 1.05rem; line-height: 1.8; color: var(--md-sys-color-text-main); white-space: pre-wrap; letter-spacing: 0.02em;">${ann.content}</div>
                `;

                // 動態同步更新瀏覽器的分頁標題
                document.title = `${ann.title} | 系統公告`;

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <h2 style="border-bottom:none; margin-top:0;"><span class="material-symbols-outlined" style="color:#ef4444;">wifi_off</span><span>讀取失敗</span></h2>
                    <p>無法與 GitHub 伺服器取得連線，請檢查網路設定。</p>
                `;
            }
        }
    </script>
</body>
</html>
