<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統公告 | Andrew</title>
    <!-- 引入 Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 【強制防禦】：確保公告內文、日期與標題在所有瀏覽器中皆 100% 靠左對齊，消除置中跑版 */
        #announcement-detail-content, 
        #announcement-detail-content * {
            text-align: left !important;
        }
    </style>
</head>
<body>

    <!-- 預載入動畫 (Preloader) -->
    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <!-- 頂部共用導覽列 -->
    <header id="navbar-container" class="navbar"></header>

    <!-- 主要內容區 -->
    <main class="full-width-content">
        <!-- 
            M3 卡片縮減頂部內距 (1rem)
            min-height (450px) 避免短文字空洞
            margin-bottom (3rem) 確保底部永遠留有美觀的卡片空隙
        -->
        <div class="card admin-view-fade" style="padding: 1rem 1.75rem 1.75rem 1.75rem; margin-top: 1rem; min-height: 450px; margin-bottom: 3rem;">
            
            <!-- 返回首頁連結 (高亮色固定，左側完全無縫隙對齊) -->
            <div style="margin-bottom: 1rem; border-bottom: 1px solid var(--md-sys-color-outline); padding-bottom: 0.5rem; text-align: left;">
                <a href="index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--md-sys-color-primary); font-weight: 500; font-size: 0.95rem; padding: 0.25rem 0; background: transparent; border: none; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span>返回首頁</span>
                </a>
            </div>

            <!-- 公告主體內容 -->
            <div id="announcement-detail-content">
                <p style="color: var(--md-sys-color-text-muted);">正在讀取公告詳細內容...</p>
            </div>
            
        </div>
    </main>

    <!-- 載入共用 JavaScript 邏輯 -->
    <script src="js/main.js"></script>
    <script>
        // 確保 Preloader 動態會在頁面載入後自動隱藏
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        // 網頁初始程序
        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbar();
            await loadDetail();
        });

        // 新增：網址自動轉換超連結函數 ( 採用安全正則表達式 )
        function convertURLsToLinks(text) {
            if (!text) return "";
            // 匹配 http:// 或 https:// 開頭，直到遇到空白或特定字元為止的網址
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                // 將網址包裝成 M3 高亮色、點擊自動開啟新分頁的超連結
                return `<a href="${url}" target="_blank" style="color: var(--md-sys-color-primary); text-decoration: underline; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">${url}</a>`;
            });
        }

        // 動態載入並渲染公告詳細內容
        async function loadDetail() {
            const container = document.getElementById('announcement-detail-content');
            const urlParams = new URLSearchParams(window.location.search);
            const annId = urlParams.get('id');

            if (!annId) {
                container.innerHTML = `
                    <h2 style="border-bottom:none; margin-top:0;"><span class="material-symbols-outlined" style="color:var(--md-sys-color-primary);">error</span><span>未指定公告 ID</span></h2>
                    <p>請返回首頁重試。</p>
                `;
                return;
            }

            try {
                const result = await fetchDatabase();
                const announcements = result.data.announcements || [];
                const ann = announcements.find(item => item.id === annId);

                if (!ann) {
                    container.innerHTML = `
                        <h2 style="border-bottom:none; margin-top:0;"><span class="material-symbols-outlined" style="color:var(--md-sys-color-primary);">find_in_page</span><span>找不到該公告內容</span></h2>
                        <p>該公告可能已被管理員移除。</p>
                    `;
                    return;
                }

                // 核心改動：先進行網址轉超連結 (convertURLsToLinks)，再進行高亮轉換 (parseHighlights)
                const formattedTitle = parseHighlights(convertURLsToLinks(ann.title));
                const formattedContent = parseHighlights(convertURLsToLinks(ann.content));

                // 成功尋獲，渲染標題、日期、詳細內容
                container.innerHTML = `
                    <div style="display: flex; gap: 0.5rem; align-items: center; color: var(--md-sys-color-primary); margin-bottom: 0.5rem; font-size: 0.95rem;">
                        <span class="material-symbols-outlined" style="font-size: 1.25em;">calendar_month</span>
                        <span>發布日期：${ann.date}</span>
                    </div>
                    <h1 style="color: var(--md-sys-color-text-main); margin-bottom: 1.25rem; border-bottom: 2px solid var(--md-sys-color-primary); padding-bottom: 0.75rem; line-height: 1.4; font-size: 2rem; letter-spacing: -0.02em;">
                        ${formattedTitle}
                    </h1>
                    <div style="font-size: 1.05rem; line-height: 1.8; color: var(--md-sys-color-text-main); white-space: pre-wrap; letter-spacing: 0.02em;">
                        ${formattedContent}
                    </div>
                `;

                document.title = `${ann.title} | 系統公告`;

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <h2 style="border-bottom:none; margin-top:0;"><span class="material-symbols-outlined" style="color:#ef4444;">wifi_off</span><span>讀取失敗</span></h2>
                    <p>無法與 GitHub 伺服器取得連線，請檢查網路設定。</p>
                `;
            }
        }
    </script>
</body>
</html>
