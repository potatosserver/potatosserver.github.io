<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統公告 | Andrew</title>
    <!-- 引入 Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 預載入動畫 (Preloader) -->
    <div id="preloader">
        <svg class="loader-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle class="loader-circle" cx="60" cy="60" r="50" fill="none"/>
        </svg>
    </div>

    <!-- 頂部共用導覽列 -->
    <header id="navbar-container" class="navbar"></header>

    <!-- 主要內容區 -->
    <main class="full-width-content">
        <!-- M3 緊湊型卡片 -->
        <div class="card admin-view-fade" style="padding: 1rem 1.75rem 1.75rem 1.75rem; margin-top: 1rem; min-height: 450px; margin-bottom: 3rem;">
            
            <!-- 返回首頁連結 -->
            <div style="margin-bottom: 1rem; border-bottom: 1px solid var(--md-sys-color-outline); padding-bottom: 0.5rem; text-align: left;">
                <a href="index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--md-sys-color-primary); font-weight: 500; font-size: 0.95rem; padding: 0.25rem 0; background: transparent; border: none; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span>返回首頁</span>
                </a>
            </div>

            <!-- 
                【優化項目】：將 HTML 骨架靜態化寫在這裡
                預設設定 display: none，等資料載入完成才一次顯示，外觀絕不受程式碼縮排影響。
            -->
            <div id="announcement-detail-content" style="display: none; text-align: left;">
                
                <!-- 1. 發布日期區塊 -->
                <div style="display: flex; gap: 0.5rem; align-items: center; color: var(--md-sys-color-primary); margin-bottom: 0.5rem; font-size: 0.95rem;">
                    <span class="material-symbols-outlined" style="font-size: 1.25em;">calendar_month</span>
                    <span id="detail-date"></span>
                </div>
                
                <!-- 2. 公告大標題 -->
                <h1 id="detail-title" style="color: var(--md-sys-color-text-main); margin-bottom: 1.25rem; border-bottom: 2px solid var(--md-sys-color-primary); padding-bottom: 0.75rem; line-height: 1.4; font-size: 2rem; letter-spacing: -0.02em;"></h1>
                
                <!-- 3. 公告詳細內文 ( 100% 安全，文字左側絕不漏出縫隙 ) -->
                <div id="detail-body" style="font-size: 1.05rem; line-height: 1.8; color: var(--md-sys-color-text-main); white-space: pre-wrap; letter-spacing: 0.02em;"></div>
            
            </div>
            
            <!-- 載入中提示 -->
            <div id="detail-loading" style="color: var(--md-sys-color-text-muted); padding: 1rem 0;">
                <p>正在讀取公告詳細內容...</p>
            </div>
            
        </div>
    </main>

    <!-- 載入共用 JavaScript 邏輯 -->
    <script src="js/main.js"></script>
    <script>
        // 確保 Preloader 控制
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => preloader.classList.add('hidden'), 200);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbar();
            await loadDetail();
        });

        // 網址自動轉換超連結函數
        function convertURLsToLinks(text) {
            if (!text) return "";
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" style="color: var(--md-sys-color-primary); text-decoration: underline; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">${url}</a>`;
            });
        }

        // 核心：直接注入 DOM 節點，100% 免疫縮排空格 Bug
        async function loadDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const annId = urlParams.get('id');

            const loadingEl = document.getElementById('detail-loading');
            const contentEl = document.getElementById('announcement-detail-content');

            if (!annId) {
                loadingEl.innerHTML = `
                    <h2 style="color:#ef4444; display:flex; align-items:center; gap:8px;"><span class="material-symbols-outlined">error</span>未指定公告 ID</h2>
                    <p style="margin-top:10px;">請返回首頁重試。</p>
                `;
                return;
            }

            try {
                const result = await fetchDatabase();
                const announcements = result.data.announcements || [];
                const ann = announcements.find(item => item.id === annId);

                if (!ann) {
                    loadingEl.innerHTML = `
                        <h2 style="color:#ef4444; display:flex; align-items:center; gap:8px;"><span class="material-symbols-outlined">find_in_page</span>找不到該公告內容</h2>
                        <p style="margin-top:10px;">該公告可能已被管理員移除。</p>
                    `;
                    return;
                }

                // 網址與高亮功能無縫串聯
                const formattedTitle = parseHighlights(convertURLsToLinks(ann.title));
                const formattedContent = parseHighlights(convertURLsToLinks(ann.content));

                // 【核心安全注入】：直接賦值給 element.innerHTML，乾淨無暇
                document.getElementById('detail-date').innerText = `發布日期：${ann.date}`;
                document.getElementById('detail-title').innerHTML = formattedTitle;
                document.getElementById('detail-body').innerHTML = formattedContent;

                // 隱藏載入提示，顯示正式公告
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';

                document.title = `${ann.title} | 系統公告`;

            } catch (error) {
                console.error(error);
                loadingEl.innerHTML = `
                    <h2 style="color:#ef4444; display:flex; align-items:center; gap:8px;"><span class="material-symbols-outlined">wifi_off</span>讀取失敗</h2>
                    <p style="margin-top:10px;">無法與 GitHub 伺服器取得連線，請檢查網路設定。</p>
                `;
            }
        }
    </script>
</body>
</html>
